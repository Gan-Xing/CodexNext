<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1350" viewBox="0 0 1800 1350">
  <defs>
    <style>
      .bg { fill: #f6f6f3; }
      .panel { fill: #ffffff; stroke: #dededb; stroke-width: 1.5; }
      .soft { fill: #f5f5f3; stroke: #e5e5e2; stroke-width: 1.2; }
      .card { fill: #ffffff; stroke: #dededb; stroke-width: 1.2; }
      .rail { fill: #f0f0ee; stroke: #e4e4e1; stroke-width: 1.2; }
      .ink { fill: #202124; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; }
      .muted { fill: #85888d; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; }
      .faint { fill: #b2b4b8; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; }
      .label { fill: #6f7378; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: .08em; }
      .title { fill: #202124; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; font-size: 27px; font-weight: 720; }
      .body { fill: #202124; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; font-size: 21px; font-weight: 620; }
      .small { fill: #777a80; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; font-size: 16px; font-weight: 600; }
      .tiny { fill: #85888d; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; font-size: 13px; font-weight: 600; }
      .mono { fill: #3a3d42; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
      .buttonText { fill: #ffffff; font-family: "Avenir Next", "SF Pro Display", Arial, sans-serif; font-size: 19px; font-weight: 760; }
      .black { fill: #1c1e21; }
      .line { stroke: #dfdfdc; stroke-width: 1.2; }
      .check { fill: none; stroke: #55595f; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #13795b; }
      .warn { fill: #986a19; }
      .shadow { filter: drop-shadow(0 18px 32px rgba(17, 19, 21, 0.10)); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1350"/>
  <text class="ink" x="50" y="48" font-size="28" font-weight="760">CodexNext Phase 2A 普通新会话 UI 交互九宫格</text>
  <text class="muted" x="50" y="76" font-size="16" font-weight="600">目标：像 Happy / Codex 一样清爽。首页只保留聊天输入框；设备、项目、权限、模型、推理进入轻量弹窗或下拉。</text>

  <!-- Panel 01 -->
  <g transform="translate(50,105)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">01 EMPTY NEW CHAT</text>
    <rect class="rail" x="18" y="58" width="54" height="292" rx="18"/>
    <rect class="black" x="28" y="75" width="34" height="34" rx="10"/>
    <text class="buttonText" x="34" y="98" font-size="12">CN</text>
    <rect class="card" x="27" y="124" width="36" height="36" rx="12"/>
    <text class="tiny" x="33" y="147">设备</text>
    <circle class="dot" cx="60" cy="125" r="4"/>
    <rect class="soft" x="145" y="238" width="330" height="88" rx="24"/>
    <text class="faint" x="166" y="272" font-size="18">要在 CodexNext 中构建什么？</text>
    <text class="body" x="166" y="310" font-size="25">+</text>
    <rect class="card" x="208" y="287" width="82" height="31" rx="16"/>
    <text class="small" x="224" y="308">选择项目</text>
    <rect class="card" x="299" y="287" width="82" height="31" rx="16"/>
    <text class="small" x="314" y="308">5.5 超高</text>
    <rect class="card" x="390" y="287" width="78" height="31" rx="16"/>
    <text class="small" x="406" y="308">请求批准</text>
    <circle class="black" cx="454" cy="282" r="22"/>
    <text class="buttonText" x="447" y="289">↑</text>
  </g>

  <!-- Panel 02 -->
  <g transform="translate(630,105)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">02 DEVICE SHEET</text>
    <rect class="rail" x="18" y="58" width="54" height="292" rx="18"/>
    <rect class="black" x="28" y="75" width="34" height="34" rx="10"/>
    <rect class="card shadow" x="92" y="58" width="320" height="292" rx="24"/>
    <text class="title" x="118" y="100">选择设备</text>
    <text class="small" x="118" y="126">设备名代表要控制的 Codex Agent</text>
    <rect class="soft" x="114" y="148" width="272" height="54" rx="16"/>
    <circle class="dot" cx="138" cy="175" r="6"/>
    <text class="body" x="154" y="171">MacBookAir</text>
    <text class="tiny" x="154" y="190">在线 · codex-cli 0.137</text>
    <text class="muted" x="358" y="182" font-size="18">✎</text>
    <rect class="card" x="114" y="211" width="272" height="54" rx="16"/>
    <circle class="faint" cx="138" cy="238" r="6"/>
    <text class="body" x="154" y="234">Office Mac mini</text>
    <text class="tiny" x="154" y="253">未连接 · 可编辑名称</text>
    <rect class="card" x="114" y="274" width="272" height="48" rx="16"/>
    <text class="body" x="134" y="304">+ 添加远程服务器</text>
  </g>

  <!-- Panel 03 -->
  <g transform="translate(1210,105)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">03 PROJECT PICKER</text>
    <rect class="soft" x="155" y="258" width="310" height="62" rx="22"/>
    <text class="faint" x="175" y="295">composer 保持在底部背景中</text>
    <rect class="card shadow" x="52" y="58" width="350" height="292" rx="24"/>
    <text class="title" x="78" y="98">选择项目文件夹</text>
    <rect class="soft" x="78" y="116" width="274" height="38" rx="14"/>
    <text class="small" x="96" y="140">搜索或选择文件夹</text>
    <text class="mono" x="78" y="180">/Users/ganxing</text>
    <line class="line" x1="78" y1="194" x2="352" y2="194"/>
    <text class="body" x="94" y="224">📁 Dev</text>
    <text class="body" x="94" y="258">📁 Desktop</text>
    <text class="body" x="94" y="292">📁 Documents</text>
    <rect class="soft" x="82" y="305" width="266" height="38" rx="14"/>
    <text class="body" x="100" y="330">📁 CodexNext</text>
    <rect class="black" x="250" y="310" width="88" height="28" rx="14"/>
    <text class="buttonText" x="268" y="330" font-size="14">使用</text>
  </g>

  <!-- Panel 04 -->
  <g transform="translate(50,515)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">04 PERMISSION MENU</text>
    <rect class="soft" x="110" y="260" width="340" height="70" rx="24"/>
    <text class="body" x="135" y="304">+</text>
    <rect class="card" x="330" y="282" width="92" height="32" rx="16"/>
    <text class="small" x="348" y="304">请求批准⌄</text>
    <circle class="black" cx="432" cy="297" r="20"/>
    <text class="buttonText" x="426" y="304">↑</text>
    <rect class="card shadow" x="74" y="58" width="392" height="210" rx="24"/>
    <text class="small" x="104" y="91">应如何批准 Codex 操作？</text>
    <text class="body" x="118" y="129">请求批准</text>
    <text class="small" x="118" y="151">编辑外部文件和联网时始终询问</text>
    <text class="body" x="118" y="190">替我审批</text>
    <text class="small" x="118" y="212">仅对检测到的风险操作请求批准</text>
    <rect class="soft" x="96" y="226" width="338" height="50" rx="16"/>
    <text class="body" x="118" y="257">完全访问权限</text>
    <path class="check" d="M397 246 l8 9 l17 -22"/>
  </g>

  <!-- Panel 05 -->
  <g transform="translate(630,515)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">05 MODEL + REASONING</text>
    <rect class="soft" x="110" y="260" width="340" height="70" rx="24"/>
    <rect class="card" x="212" y="282" width="94" height="32" rx="16"/>
    <text class="small" x="230" y="304">5.5 超高⌄</text>
    <circle class="black" cx="432" cy="297" r="20"/>
    <text class="buttonText" x="426" y="304">↑</text>
    <rect class="card shadow" x="116" y="55" width="290" height="236" rx="24"/>
    <text class="small" x="140" y="88">推理</text>
    <text class="body" x="140" y="123">低</text>
    <text class="body" x="140" y="156">中</text>
    <rect class="soft" x="128" y="171" width="246" height="38" rx="14"/>
    <text class="body" x="140" y="197">高</text>
    <text class="body" x="140" y="233">超高</text>
    <path class="check" d="M350 222 l7 8 l15 -20"/>
    <line class="line" x1="138" y1="246" x2="378" y2="246"/>
    <text class="body" x="140" y="275">GPT-5.5</text>
    <text class="muted" x="354" y="275" font-size="24">›</text>
  </g>

  <!-- Panel 06 -->
  <g transform="translate(1210,515)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">06 TYPE + SEND</text>
    <rect class="rail" x="18" y="58" width="54" height="292" rx="18"/>
    <rect class="black" x="28" y="75" width="34" height="34" rx="10"/>
    <circle class="dot" cx="60" cy="125" r="4"/>
    <rect class="soft" x="116" y="220" width="350" height="110" rx="26"/>
    <text class="body" x="140" y="257">检查这个项目，先告诉我</text>
    <text class="body" x="140" y="287">有哪些明显问题</text>
    <text class="body" x="140" y="317">+</text>
    <rect class="card" x="182" y="296" width="86" height="30" rx="15"/>
    <text class="small" x="199" y="316">CodexNext</text>
    <rect class="card" x="277" y="296" width="84" height="30" rx="15"/>
    <text class="small" x="292" y="316">5.5 超高</text>
    <rect class="card" x="370" y="296" width="76" height="30" rx="15"/>
    <text class="small" x="386" y="316">请求批准</text>
    <circle class="black" cx="440" cy="252" r="22"/>
    <text class="buttonText" x="433" y="259">↑</text>
  </g>

  <!-- Panel 07 -->
  <g transform="translate(50,925)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">07 CHAT VIEW</text>
    <rect class="rail" x="18" y="58" width="54" height="292" rx="18"/>
    <rect class="black" x="28" y="75" width="34" height="34" rx="10"/>
    <text class="small" x="102" y="72">CodexNext / CodexNext repo / GPT-5.5 超高</text>
    <rect class="soft" x="102" y="98" width="348" height="54" rx="18"/>
    <text class="body" x="124" y="131">检查这个项目，先告诉我有哪些明显问题</text>
    <rect class="card" x="102" y="170" width="374" height="78" rx="18"/>
    <text class="small" x="124" y="198">Codex 正在检查仓库结构…</text>
    <text class="small" x="124" y="224">我会先看 package、agent 和 web 的边界。</text>
    <rect class="soft" x="102" y="260" width="374" height="50" rx="15"/>
    <text class="mono" x="124" y="290">$ rg --files apps packages</text>
    <rect class="soft" x="102" y="318" width="374" height="34" rx="17"/>
    <text class="faint" x="122" y="341">追加指令…</text>
  </g>

  <!-- Panel 08 -->
  <g transform="translate(630,925)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">08 STEER RUNNING TURN</text>
    <rect class="rail" x="18" y="58" width="54" height="292" rx="18"/>
    <rect class="soft" x="100" y="80" width="92" height="28" rx="14"/>
    <text class="small" x="117" y="100">正在运行</text>
    <text class="small" x="205" y="100">Interrupt</text>
    <rect class="card" x="100" y="132" width="360" height="82" rx="18"/>
    <text class="small" x="122" y="162">assistant delta streaming…</text>
    <text class="small" x="122" y="190">计划已更新，准备执行命令。</text>
    <rect class="soft" x="100" y="255" width="360" height="76" rx="24"/>
    <text class="body" x="124" y="286">先不要改代码，只输出问题列表</text>
    <text class="small" x="124" y="316">追加指令或调整方向…</text>
    <circle class="black" cx="438" cy="293" r="20"/>
    <text class="buttonText" x="432" y="300">↑</text>
  </g>

  <!-- Panel 09 -->
  <g transform="translate(1210,925)">
    <rect class="panel shadow" x="0" y="0" width="540" height="370" rx="26"/>
    <text class="label" x="24" y="36">09 APPROVAL REQUEST</text>
    <rect class="rail" x="18" y="58" width="54" height="292" rx="18"/>
    <rect class="card" x="104" y="82" width="330" height="74" rx="18"/>
    <text class="small" x="126" y="112">Codex 请求批准</text>
    <text class="mono" x="126" y="138">pnpm test</text>
    <rect class="card shadow" x="76" y="142" width="388" height="188" rx="24"/>
    <text class="title" x="104" y="184">Codex 请求批准</text>
    <text class="small" x="104" y="214">命令将读取并运行本地项目测试。</text>
    <text class="mono" x="104" y="244">cwd: /Users/ganxing/Dev/CodexNext</text>
    <rect class="black" x="104" y="274" width="74" height="34" rx="17"/>
    <text class="buttonText" x="124" y="297" font-size="15">接受</text>
    <rect class="card" x="186" y="274" width="112" height="34" rx="17"/>
    <text class="small" x="202" y="296">本次会话接受</text>
    <rect class="card" x="306" y="274" width="62" height="34" rx="17"/>
    <text class="small" x="324" y="296">拒绝</text>
    <rect class="card" x="376" y="274" width="62" height="34" rx="17"/>
    <text class="small" x="394" y="296">取消</text>
  </g>
</svg>
